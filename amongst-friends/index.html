<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amongst Friends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --border: #1e1e30;
      --text: #e2e0f0;
      --muted: #52506e;
      --accent: #a78bfa;
      --accent-2: #60a5fa;
      --accent-dim: rgba(167, 139, 250, 0.08);
      --font-mono: 'DM Mono', monospace;
      --font-display: 'Playfair Display', serif;
      --nav-height: 60px;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px;
      pointer-events: none;
      z-index: 999;
      opacity: 0.45;
    }

    .glow-1, .glow-2 {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      top: -20%;
      left: 15%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.06) 0%, transparent 65%);
    }
    .glow-2 {
      top: 10%;
      right: 5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.05) 0%, transparent 65%);
    }

    /* ── NAV ── */
    nav.site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-height);
      width: 100%;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 9, 15, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      animation: fadeDown 0.5s ease forwards;
      animation-delay: 0.05s;
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
    }
    .nav-logo:hover { color: var(--accent); }
    .nav-logo .logo-tilde { color: var(--accent); font-size: 1rem; }

    .nav-support {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.18s;
    }
    .nav-support:hover { color: var(--accent); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 2rem 3rem;
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.2s;
    }
    .label span { color: var(--accent); }

    .hero { margin-bottom: 2.5rem; }

    .hero h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: 0.35s;
    }

    .hero h1 em {
      font-style: italic;
      font-weight: 400;
      background: linear-gradient(105deg, var(--accent) 20%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.5s;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }
    .divider-gem {
      width: 6px;
      height: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transform: rotate(45deg);
      border-radius: 1px;
      box-shadow: 0 0 8px rgba(167, 139, 250, 0.4);
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #6e6b8a;
      max-width: 460px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.65s;
    }

    .links {
      margin-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.8s;
    }

    .link-item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-decoration: none;
      background: transparent;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .link-item:hover { border-color: var(--accent); color: var(--accent); }
    .link-item:hover::before { opacity: 1; }
    .link-item .arrow { font-size: 0.7rem; transition: transform 0.2s; }
    .link-item:hover .arrow { transform: translate(2px, -2px); }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      padding: 1.25rem 2rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1s;
    }

    .footer-text {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.75); }
    }

    @media (max-width: 600px) {
      footer { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="logo-tilde">~</span>wyattmakesstuff
      </a>
      <a href="/amongst-friends/support" class="nav-support">support</a>
    </div>
  </nav>

  <main>
    <p class="label">// <span>amongst friends</span></p>

    <div class="hero">
      <h1>Amongst<br><em>Friends.</em></h1>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
    </div>

    <p class="bio">
      Something's coming. Check back soon.
    </p>

    <nav class="links" aria-label="Links">
      <a class="link-item" href="/amongst-friends/support">
        Support <span class="arrow">→</span>
      </a>
    </nav>
  </main>

  <footer>
    <span class="footer-text">wyattmakesstuff.com / amongst-friends</span>
    <span class="status">
      <span class="status-dot"></span>
      coming soon
    </span>
  </footer>

</body>
</html>
